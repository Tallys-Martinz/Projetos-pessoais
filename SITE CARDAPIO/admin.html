<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/output.css" />
    <title>Painel do Vendedor - Dev Burguer</title>
    <style>
        /* Animação do modal */
        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fade-in-up 0.25s ease-out; }
        #admin-login.hidden { display: none; }
        #admin-pass:focus { box-shadow: 0 0 0 4px rgba(239,68,68,0.15); }
    </style>
</head>
<body class="bg-gray-100">

    <!-- 🔐 Modal de Login Admin -->
    <div id="admin-login" class="fixed inset-0 z-50 hidden" aria-modal="true" role="dialog">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-[2px]" onclick="closeLoginModal()"></div>
        <div class="relative min-h-full flex items-center justify-center p-4">
            <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 border border-gray-100 animate-fade-in-up">
                <div class="text-center mb-6">
                    <div class="inline-flex items-center justify-center w-12 h-12 bg-red-500 rounded-xl mb-3">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                        </svg>
                    </div>
                    <h3 class="text-lg font-bold text-gray-800">Acesso Restrito</h3>
                    <p class="text-sm text-gray-500 mt-1">Painel Administrativo</p>
                </div>

                <form id="login-form" class="space-y-4" onsubmit="handleLogin(event)">
                    <div>
                        <label for="admin-pass" class="sr-only">Senha</label>
                        <input type="password" id="admin-pass"
                            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500 text-center font-mono tracking-widest"
                            placeholder="••••••" maxlength="20" autocomplete="current-password" required>
                    </div>
                    <div id="login-error" class="hidden text-center text-sm text-red-600 font-medium bg-red-50 py-2 px-3 rounded-lg">
                        Senha incorreta
                    </div>
                    <div class="flex gap-3">
                        <button type="button" onclick="closeLoginModal()" class="flex-1 py-2.5 px-4 border border-gray-300 text-gray-700 font-semibold rounded-xl hover:bg-gray-50">Cancelar</button>
                        <button type="submit" class="flex-1 py-2.5 px-4 bg-red-500 text-white font-semibold rounded-xl hover:bg-red-600">Entrar</button>
                    </div>
                </form>

                <div class="mt-5 pt-4 border-t border-gray-100 text-center">
                    <button onclick="logout()" class="text-xs text-gray-400 hover:text-red-500">Sair da sessão</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 🔘 Botão Flutuante Admin -->
    <button id="open-admin-login" class="fixed bottom-5 right-5 w-12 h-12 bg-gray-800 hover:bg-gray-700 text-white rounded-full shadow-lg flex items-center justify-center transition-transform hover:scale-105 z-40" title="Painel Admin">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
        </svg>
    </button>

    <!-- Navegação -->
    <nav class="bg-zinc-900 p-4 text-white flex justify-between">
        <h1 class="font-bold">Painel de Pedidos</h1>
        <a href="index.html" id="btn-sair" class="bg-red-500 px-3 py-1 rounded">Sair</a>
    </nav>

    <!-- Conteúdo Principal -->
    <main class="max-w-7xl mx-auto p-4">
        <div class="bg-white p-4 rounded shadow-md mb-6">
            <h2 class="text-xl font-bold mb-3">Controle da Loja</h2>
            <div class="flex items-center gap-4">
                <span>Status atual: <strong id="status-atual" class="text-lg">Carregando...</strong></span>
                <button onclick="alterarStatus('aberto')" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded">Abrir Loja</button>
                <button onclick="alterarStatus('fechado')" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded">Fechar Loja</button>
            </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="pedidos-lista"></div>
    </main>

    <!-- Scripts -->
    <script src="admin.js"></script>
</body>
</html>
