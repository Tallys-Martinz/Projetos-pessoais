<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conteúdos</title>
  <link rel="icon" href="icone/icone.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body,
    html {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      height: 100%;
      display: flex;
      flex-direction: column;
      scroll-behavior: smooth;
    }
  </style>
</head>

<body>

  <body class="bg-gradient-to-r from-cyan-50 to-white">

    <header class="relative w-full bg-gradient-to-r from-gray-950 to-cyan-950 shadow-md z-20">

      <a href="http://ufg.br/" class="absolute top-4 left-4 z-30 sm:hidden">
        <img class="h-8 w-auto opacity-80 hover:opacity-100 transition-opacity" src="assets/UFG.png" alt="Logo UFG">
      </a>
      <a href="https://www.instagram.com/connectlab_ufg/" class="absolute top-3 right-4 z-30 sm:hidden">
        <div
          class="w-10 h-10 rounded-full overflow-hidden border-2 border-black transition-transform duration-500 hover:scale-125 bg-white">
          <img class="w-full h-full object-cover" src="assets/connectlab.jpg" alt="Logo ConnectLab">
        </div>
      </a>

      <nav class="mx-auto px-4 border-b-2 border-slate-400">
        <div class="flex flex-col sm:flex-row items-center justify-between py-4 sm:h-24 max-w-7xl mx-auto">

          <div class="hidden sm:block flex-shrink-0">
            <a href="http://ufg.br/">
              <img class="h-10 w-auto opacity-80 hover:opacity-100 transition-opacity" src="assets/UFG.png"
                alt="Logo UFG">
            </a>
          </div>

          <div class="flex flex-col sm:flex-row items-center sm:space-x-8">
            <div class="flex-shrink-0 mb-4 sm:mb-0">
              <img class="h-14 w-auto bg-transparent" src="assets/proef.png" alt="Logo Proef">
            </div>

            <div class="font-bold flex flex-wrap justify-center gap-y-3 sm:space-x-4 text-white text-sm sm:text-base">
              <a href="index.html"
                class="hover:bg-cyan-800 px-2 py-1 rounded transition-transform duration-300 hover:scale-110">Página
                Inicial</a>
              <a href="Atividades.html"
                class="hover:bg-cyan-800 px-2 py-1 rounded transition-transform duration-300 hover:scale-110">Atividades</a>
              <a href="Cards.html"
                class="hover:bg-cyan-800 px-2 py-1 rounded transition-transform duration-300 hover:scale-110">Cards</a>
              <a href="Conteudos.html"
                class="hover:bg-cyan-800 px-2 py-1 rounded transition-transform duration-300 hover:scale-110">Conteúdos</a>
            </div>
          </div>

          <div class="hidden sm:block flex-shrink-0">
            <a href="https://www.instagram.com/connectlab_ufg/">
              <div
                class="w-10 h-10 rounded-full overflow-hidden border-2 border-black transition-transform duration-500 hover:scale-125 bg-white">
                <img class="w-full h-full object-cover" src="assets/connectlab.jpg" alt="Logo ConnectLab">
              </div>
            </a>
          </div>

        </div>
      </nav>
    </header>

    <footer class="w-full bg-gradient-to-r from-black to-gray-900 py-16 px-6 border-t border-cyan-900/50">
  <div class="max-w-5xl mx-auto text-white">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-12">

      <div>
        <h4 class="text-cyan-600 font-bold text-3xl mb-4 tracking-tight">Dúvidas e Suporte</h4>
        <p class="text-gray-400 text-lg mb-8">
          Encontrou algum problema ou tem sugestões?
          Envie sua mensagem abaixo.
        </p>
        
        <div class="hidden md:block">
          <p class="text-gray-600 text-sm mb-3">
            Esta obra está licenciada abertamente sob a licença BY-NC 4.0.
          </p>
          <img class="w-32 opacity-60 hover:opacity-100 transition-opacity" src="assets/by-nc.png" alt="Licença BY-NC 4.0">
        </div>
      </div>

      <form action="https://api.web3forms.com/submit" method="POST" class="flex flex-col gap-4 bg-gray-950/50 p-6 rounded-2xl border border-white/5 shadow-inner">
        
        <input type="hidden" name="access_key" value="COLE_A_CHAVE_DO_CLIENTE_AQUI">
        
        <input type="hidden" name="subject" value="Novo Contato - Suporte Atletic Cards">
        <input type="hidden" name="from_name" value="Sistema de Suporte do Site">

        <input type="email" name="email" placeholder="Seu melhor e-mail" required
          class="w-full bg-gray-800 border border-gray-700 rounded-lg py-3 px-4 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-cyan-500/50 focus:border-cyan-500 transition-all">

        <textarea name="mensagem" placeholder="Descreva aqui o problema ou dúvida..." rows="4" required
          class="w-full bg-gray-800 border border-gray-700 rounded-lg py-3 px-4 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-cyan-500/50 focus:border-cyan-500 transition-all resize-none"></textarea>

        <label class="flex items-center gap-3 cursor-pointer group">
          <input type="checkbox" name="solicita_retorno"
            class="w-5 h-5 rounded border-gray-700 bg-gray-800 text-cyan-500 focus:ring-offset-gray-900 focus:ring-cyan-500 cursor-pointer">
          <span class="text-gray-400 text-sm group-hover:text-gray-300 transition-colors">
            Gostaria de receber um retorno sobre minha dúvida.
          </span>
        </label>

        <input type="checkbox" name="botcheck" class="hidden" style="display: none;">

        <button type="submit"
          class="mt-2 w-full bg-cyan-700 hover:bg-cyan-500 text-white font-bold py-3 rounded-lg shadow-lg shadow-cyan-900/20 transition-all active:scale-95">
          Enviar Mensagem
        </button>

        <div class="mt-6 flex flex-col items-center gap-3 md:hidden">
          <p class="text-gray-500 text-xs text-center">
            Esta obra está licenciada abertamente sob a licença BY-NC 4.0.
          </p>
          <img class="w-24 opacity-50" src="assets/by-nc.png" alt="Licença BY-NC 4.0">
        </div>
      </form>

    </div>
  </div>
</footer>
  </body>

</html>
